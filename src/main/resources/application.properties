spring.application.name=SpringProj
spring.messages.basename=messages

spring.datasource.url=jdbc:mysql://localhost:3307/vod
spring.datasource.username=root
spring.datasource.password=mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

management.endpoint.shutdown.enabled=true
management.endpoints.web.exposure.include=*
management.info.env.enabled=true

info.app.name=SpringProj
info.app.version=0.9
info.app.description=Application serving information about Formula 1 seasons and standings
