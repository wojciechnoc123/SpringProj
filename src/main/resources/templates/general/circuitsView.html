<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Circuits</title>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type"/>
    <link rel="stylesheet" th:href="@{/css/styleGeneric.css}"/>
    <link href="https://fonts.googleapis.com/css?family=Orbitron" rel="stylesheet"/>
</head>
<body>
<header>
    <h1> Cokolwiek </h1>

</header>
<section>

    <table>
        <tr>
            <th>Name</th>
            <th>Country</th>
            <th>Location</th>
        </tr>

        <tr th:each="c : ${circuits}">
            <td th:text="${c.name}"></td>
            <td th:text="${c.country}"></td>
            <td th:text="${c.location}"></td>
        </tr>
    </table>

</section>

<footer>
    <a th:href="@{/ui/}">Return</a>
</footer>
</body>
</html>
