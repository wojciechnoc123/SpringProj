<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Teams</title>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type"/>
    <link rel="stylesheet" th:href="@{/css/styleGeneric.css}"/>
    <link href="https://fonts.googleapis.com/css?family=Orbitron" rel="stylesheet"/>
</head>
<body>
<header>
    <h1> Cokolwiek </h1>
</header>
<section>
    <table>
        <tr>
            <th>Name</th>
            <th>Location</th>
            <th>Country</th>
        </tr>

        <tr th:each="t : ${teams}">
            <td th:text="${t.name}"></td>
            <td th:text="${t.cityLocation}"></td>
            <td th:text="${t.country}"></td>

        </tr>
    </table>
</section>
<footer>
    <a th:href="@{/ui/}">Return</a>
</footer>
</body>
</html>
