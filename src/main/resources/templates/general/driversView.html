<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Drivers</title>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type"/>

    <link rel="stylesheet" th:href="@{/css/styleGeneric.css}"/>

    <link href="https://fonts.googleapis.com/css?family=Orbitron" rel="stylesheet"/>
</head>
<body>
<header>
    <h1> Cokolwiek </h1>

</header>
<section>

    <table>
        <tr>
            <th>First name</th>
            <th>Last name</th>
            <th>Age</th>
            <th>Country</th>
        </tr>

        <tr th:each="d : ${drivers}">
            <td th:text="${d.firstName}"></td>
            <td th:text="${d.lastName}"></td>
            <td th:text="${d.age}"></td>
            <td th:text="${d.country}"></td>
        </tr>
    </table>

</section>

<footer>
    <a th:href="@{/ui/}">Return</a>
</footer>
</body>
</html>
