<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Engine Suppliers</title>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type"/>
    <!-- <link rel="stylesheet" th:href="@{/css/style.css}"/> -->
    <link rel="stylesheet" th:href="@{/css/styleGeneric.css}"/>
    <link href="https://fonts.googleapis.com/css?family=Orbitron" rel="stylesheet"/>
</head>
<body>
<header>
    <h1> Cokolwiek </h1>

</header>
<section>

    <table>
        <tr>
            <th>Name</th>
            <th>Location</th>
            <th>Country</th>

        <tr th:each="es : ${engineSuppliers}">

            <td th:text="${es.cityLocation}"></td>

        </tr>
    </table>

</section>

<footer>

</footer>

</body>
</html>
