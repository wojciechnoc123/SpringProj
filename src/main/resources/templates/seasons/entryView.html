<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>EntryList</title>
  <meta content="text/html; charset=utf-8" http-equiv="Content-Type"/>

  <link rel="stylesheet" th:href="@{/css/styleGeneric.css}"/>

  <link href="https://fonts.googleapis.com/css?family=Orbitron" rel="stylesheet"/>
</head>
<body>
<header>
  <h1> Cokolwiek </h1>

</header>
<section>

  <table>
    <tr>
      <th>Team</th>
      <th> Country</th>
      <th>Engine</th>
      <th>Chassis</th>
      <th>Drivers</th>
    </tr>

    <th:block th:each="e : ${entries}">
      <tr>
        <td rowspan="2" th:text="${e.team.name}"></td>
        <td rowspan="2" th:text="${e.team.country}"></td>
        <td rowspan="2" th:text="${e.engine.name}"></td>
        <td rowspan="2" th:text="${e.chassisName}"></td>
        <td th:text="${e.firstDriver.number + ' ' + e.firstDriver.driver.firstname + ' ' + e.firstDriver.driver.lastname}"></td>
      </tr>
      <tr>
        <td th:text="${e.secondDriver.number + ' ' + e.secondDriver.driver.firstname + ' ' + e.secondDriver.driver.lastname}"></td>
      </tr>
    </th:block>
  </table>

</section>

<footer>
  <a th:href="@{/ui/seasons/{year} (year = ${year})}">Return</a>
</footer>

</body>
</html>
